name: SQLFluff Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  sqlfluff:
    name: Run SQLFluff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run SQLFluff lint
        run: uv run sqlfluff lint .
