# This is a Databricks asset bundle definition for quantified_self.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: quantified_self
  uuid: 20386458-24aa-4b81-8281-e5cba1970d12

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
    variables:
      catalog: quantified_self
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/punit98@protonmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: quantified_self
      schema: prod
    permissions:
      - user_name: punit98@protonmail.com
        level: CAN_MANAGE
