bundle:
  name: quantified_self
  uuid: 20386458-24aa-4b81-8281-e5cba1970d12
  # Removed: engine: direct (not a valid DABs bundle field)

include:
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
    default: ${bundle.name}_${bundle.target}
  raw_schema:
    description: The schema to use for raw data
    default: raw
  bronze_schema:
    description: The schema to use for bronze data
    default: bronze
  silver_schema:
    description: The schema to use for silver data
    default: silver
  gold_schema:
    description: The schema to use for gold data
    default: gold
  seed_schema:
    description: The schema to use for seed data
    default: seed

targets:
  dev:
    default: true
    mode: development
    # Disable dev-mode's automatic `dev_<short_name>_` name prefix. It only rewrites
    # resource names (schemas/volumes/pipelines), NOT the schema strings passed via the
    # pipeline `configuration:` block — so leaving it on makes the schema RESOURCE
    # (dev_punit98_raw) and the CONFIG value (raw) diverge, and transformations fail to
    # find the schema. Dev/prod isolation already comes from the separate catalog
    # (quantified_self_dev vs quantified_self), so the prefix isn't needed.
    presets:
      name_prefix: ""
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: quantified_self_dev
      raw_schema: raw
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      seed_schema: seed

    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false

  prod:
    mode: production
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: quantified_self
    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false
    permissions:
      - user_name: punit98@protonmail.com
        level: CAN_MANAGE