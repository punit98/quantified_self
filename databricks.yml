bundle:
  name: quantified_self
  uuid: 20386458-24aa-4b81-8281-e5cba1970d12

include:
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
    default: ${bundle.name}_${bundle.target}

  raw_schema:
    description: Raw schema
    default: raw
  bronze_schema:
    description: Bronze schema
    default: bronze
  silver_schema:
    description: Silver schema
    default: silver
  gold_schema:
    description: Gold schema
    default: gold
  seed_schema:
    description: Seed schema
    default: seed

targets:
  dev:
    default: true
    # mode: development   <-- REMOVE THIS
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}

    variables:
      pipeline_name: quantified_self_etl_pipeline_dev
      catalog: quantified_self_dev
      raw_schema: dev_punit98_raw
      bronze_schema: dev_punit98_bronze
      silver_schema: dev_punit98_silver
      gold_schema: dev_punit98_gold
      seed_schema: dev_punit98_seed

    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false
          # development: true   <-- REMOVE THIS
          configuration:
            raw_schema: ${var.raw_schema}
            bronze_schema: ${var.bronze_schema}
            silver_schema: ${var.silver_schema}
            gold_schema: ${var.gold_schema}
            seed_schema: ${var.seed_schema}


  prod:
    mode: production
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}

    variables:
      pipeline_name: quantified_self_etl_pipeline
      catalog: quantified_self
      raw_schema: raw
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      seed_schema: seed

    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false

    permissions:
      - user_name: punit98@protonmail.com
        level: CAN_MANAGE
