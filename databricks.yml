bundle:
  name: quantified_self
  uuid: 20386458-24aa-4b81-8281-e5cba1970d12
  engine: direct

include:
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
    default: ${bundle.name}_${bundle.target}
  raw_schema:
    description: The schema to use for raw data
    default: raw
  bronze_schema:
    description: The schema to use for bronze data
    default: bronze
  silver_schema:
    description: The schema to use for silver data
    default: silver
  gold_schema:
    description: The schema to use for gold data
    default: gold
  seed_schema:
    description: The schema to use for seed data
    default: seed

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: quantified_self_dev
      raw_schema: ${bundle.target}_punit98_${var.raw_schema}
      bronze_schema: ${bundle.target}_punit98_${var.bronze_schema}
      silver_schema: ${bundle.target}_punit98_${var.silver_schema}
      gold_schema: ${bundle.target}_punit98_${var.gold_schema}
      seed_schema: ${bundle.target}_punit98_${var.seed_schema}

    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false

  prod:
    mode: production
    workspace:
      host: https://dbc-22d2b1a2-c7c9.cloud.databricks.com
      root_path: /Workspace/Users/punit98@protonmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: quantified_self
    resources:
      pipelines:
        quantified_self_etl_pipeline:
          continuous: false
    permissions:
      - user_name: punit98@protonmail.com
        level: CAN_MANAGE



        