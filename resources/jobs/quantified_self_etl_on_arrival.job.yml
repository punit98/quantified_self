resources:
  jobs:
    quantified_self_etl_on_arrival:
      name: quantified_self_etl_on_arrival
      trigger:
        pause_status: UNPAUSED
        file_arrival:
          url: /Volumes/${var.catalog}/${var.raw_schema}/landing_zone/
          min_time_between_triggers_seconds: 60
          wait_after_last_change_seconds: 60
      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.quantified_self_etl_pipeline.id}
            full_refresh: true
