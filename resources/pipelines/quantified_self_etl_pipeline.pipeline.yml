resources:
  pipelines:
    quantified_self_etl_pipeline:
      name: quantified_self_etl_pipeline
      catalog: ${var.catalog}
      serverless: true
      continuous: false
      channel: CURRENT

      configuration:
        catalog: ${var.catalog}
        raw_schema: ${var.raw_schema}
        bronze_schema: ${var.bronze_schema}
        silver_schema: ${var.silver_schema}
        gold_schema: ${var.gold_schema}

      libraries:
        - glob:
            include: ../../src/pipelines/quantified_self_etl/transformations/**
      # Removed: root_path (not a valid DLT pipeline resource key;
      #           root_path belongs on workspace: in databricks.yml targets)